<!DOCTYPE html>
<html>
<head>
    <title>Minimal Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .results-area { border: 1px solid #ccc; padding: 20px; margin: 20px 0; min-height: 200px; }
        .test-output { background: #f5f5f5; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Minimal Test - Exact Main.js Flow</h1>
    
    <button onclick="testExactFlow()">Test Exact Main.js Flow</button>
    <button onclick="testBasicEngine()">Test Basic Engine Only</button>
    
    <div class="test-output" id="output"></div>
    <div class="results-area" id="results-area">Results will appear here...</div>
    
    <script type="module">
        import { PreferenceManager } from './scripts/ui/preferences.js';
        import { EnhancedRecommendationEngine } from './scripts/engine/enhanced-recommender.js';
        import { RationaleGenerator } from './scripts/engine/rationale.js';
        import { ResultsRenderer } from './scripts/ui/results.js';
        import { LocationSelectionManager } from './scripts/ui/location-selection.js';
        import { RecommendationEngine } from './scripts/engine/recommender.js';
        import { locations } from './scripts/data/locations.js';
        import { rationaleTemplates } from './scripts/data/templates.js';

        const output = document.getElementById('output');
        const resultsArea = document.getElementById('results-area');
        
        function log(msg) {
            output.innerHTML += '<div>' + msg + '</div>';
            console.log(msg);
        }
        
        function clear() {
            output.innerHTML = '';
            resultsArea.innerHTML = 'Results will appear here...';
        }
        
        // Test the exact flow from main.js
        window.testExactFlow = function() {
            clear();
            log('=== Testing Exact Main.js Flow ===');
            
            try {
                // Initialize exactly like main.js
                const preferenceManager = new PreferenceManager();
                const locationSelectionManager = new LocationSelectionManager();
                const recommendationEngine = new EnhancedRecommendationEngine(locations, locationSelectionManager);
                const rationaleGenerator = new RationaleGenerator(rationaleTemplates);
                const resultsRenderer = new ResultsRenderer(resultsArea);
                
                log('✓ All managers initialized');
                
                // Set up callbacks exactly like main.js
                locationSelectionManager.onRegenerateFromSelection = () => {
                    log('Callback: onRegenerateFromSelection triggered');
                };
                
                locationSelectionManager.onRegenerateWithoutVisited = () => {
                    log('Callback: onRegenerateWithoutVisited triggered');
                };
                
                // Set preferences exactly like a user would
                preferenceManager.setDuration('1-day');
                preferenceManager.setProfile('couple');
                preferenceManager.toggleRegion('central');
                preferenceManager.toggleActivity('culture');
                
                const preferences = preferenceManager.getPreferences();
                log('Preferences: ' + JSON.stringify(preferences));
                
                // Validate exactly like main.js
                if (!preferenceManager.isValid()) {
                    log('❌ Preferences not valid');
                    return;
                }
                log('✓ Preferences valid');
                
                // Generate itinerary exactly like main.js generateItinerary function
                log('Calling generateEnhancedItinerary...');
                const result = recommendationEngine.generateEnhancedItinerary(preferences);
                log('Result type: ' + result.type);
                log('Full result: ' + JSON.stringify(result, null, 2));
                
                // Handle result exactly like main.js switch statement
                switch (result.type) {
                    case 'selection_required':
                        log('✓ Selection required - this should show selection interface');
                        log('Available count: ' + result.availableCount + ', limit: ' + result.limit);
                        // The selection interface should already be shown by the engine
                        break;
                        
                    case 'standard':
                        log('✓ Standard result - showing itinerary');
                        const rationale = rationaleGenerator.generate(preferences, result.itinerary);
                        resultsRenderer.render(rationale, result.itinerary, preferences.duration);
                        break;
                        
                    case 'no_matches':
                        log('❌ No matches found: ' + result.message);
                        break;
                        
                    case 'no_locations':
                        log('❌ No locations available: ' + result.message);
                        break;
                        
                    case 'error':
                        log('❌ Error: ' + result.message);
                        break;
                        
                    default:
                        log('❌ Unknown result type: ' + result.type);
                }
                
                // Check if selection interface was actually created
                setTimeout(() => {
                    const selectionContainer = document.querySelector('.location-selection-container');
                    if (selectionContainer) {
                        log('✓ SUCCESS: Selection interface was created!');
                        log('Interface has ' + selectionContainer.children.length + ' child elements');
                    } else {
                        log('❌ PROBLEM: Selection interface was NOT created');
                    }
                }, 100);
                
            } catch (error) {
                log('❌ ERROR: ' + error.message);
                console.error(error);
            }
        };
        
        // Test basic engine only
        window.testBasicEngine = function() {
            clear();
            log('=== Testing Basic Engine Only ===');
            
            try {
                const engine = new RecommendationEngine(locations);
                
                const preferences = {
                    duration: '1-day',
                    profile: 'couple',
                    regions: ['central'],
                    activities: ['culture'],
                    weather: 'anything'
                };
                
                log('Testing basic engine with: ' + JSON.stringify(preferences));
                
                const result = engine.generateItinerary(preferences);
                log('Basic engine result: ' + result.length + ' locations');
                
                if (result.length > 0) {
                    log('✓ Basic engine working');
                    result.forEach((loc, i) => {
                        log(`${i+1}. ${loc.name} (${loc.region}) - score: ${loc.score || 'N/A'}`);
                    });
                } else {
                    log('❌ Basic engine returned no results');
                }
                
            } catch (error) {
                log('❌ Basic engine error: ' + error.message);
                console.error(error);
            }
        };
    </script>
</body>
</html>
